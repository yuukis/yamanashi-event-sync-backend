name = "yamanashi-event-sync-backend"
main = "src/index.ts"
compatibility_date = "2026-07-18"

[vars]
ALLOWED_ORIGIN = "https://hub.yamanashi.dev"

# `wrangler kv namespace create SYNC_KV` で作成した ID に置き換えてください。
[[kv_namespaces]]
binding = "SYNC_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
